<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Left Beer Glass -->
  <g transform="translate(6, 10)">
    <!-- Glass body -->
    <path d="M2 2 L4 20 C4 22 5 24 7 24 L11 24 C13 24 14 22 14 20 L16 2 Z" 
          fill="#FFD89A" stroke="#D4A574" stroke-width="1.5"/>
    <!-- Beer foam -->
    <ellipse cx="9" cy="2" rx="7" ry="2.5" fill="#FFFDF8" opacity="0.95"/>
    <ellipse cx="7" cy="1" rx="3" ry="1.5" fill="#FFFFFF"/>
    <ellipse cx="11" cy="1" rx="3" ry="1.5" fill="#FFFFFF"/>
    <!-- Bubbles -->
    <circle cx="8" cy="12" r="1" fill="#FFF4D9" opacity="0.7"/>
    <circle cx="10" cy="16" r="0.8" fill="#FFF4D9" opacity="0.7"/>
    <circle cx="7" cy="18" r="0.6" fill="#FFF4D9" opacity="0.7"/>
  </g>

  <!-- Right Beer Glass -->
  <g transform="translate(24, 10)">
    <!-- Glass body -->
    <path d="M2 2 L4 20 C4 22 5 24 7 24 L11 24 C13 24 14 22 14 20 L16 2 Z" 
          fill="#FFD89A" stroke="#D4A574" stroke-width="1.5"/>
    <!-- Beer foam -->
    <ellipse cx="9" cy="2" rx="7" ry="2.5" fill="#FFFDF8" opacity="0.95"/>
    <ellipse cx="7" cy="1" rx="3" ry="1.5" fill="#FFFFFF"/>
    <ellipse cx="11" cy="1" rx="3" ry="1.5" fill="#FFFFFF"/>
    <!-- Bubbles -->
    <circle cx="8" cy="14" r="1" fill="#FFF4D9" opacity="0.7"/>
    <circle cx="10" cy="18" r="0.8" fill="#FFF4D9" opacity="0.7"/>
    <circle cx="7" cy="16" r="0.6" fill="#FFF4D9" opacity="0.7"/>
  </g>

  <!-- Cheers connection line (optional decorative element) -->
  <path d="M 20 18 Q 24 14 28 18" stroke="#D4A574" stroke-width="1" fill="none" opacity="0.5"/>
</svg>